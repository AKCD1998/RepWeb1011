services:
  postgres:
    # optional-docker-local host for the standard local-simulation DB.
    # Production/live stays on render-live via DATABASE_URL.
    # Historical port 55432 is legacy; the default local workflow now binds 55433.
    image: postgres:18-alpine
    container_name: rx1011-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rx1011_local
      POSTGRES_USER: rx1011
      POSTGRES_PASSWORD: rx1011
    ports:
      - "55433:5432"
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rx1011 -d rx1011_local"]
      interval: 5s
      timeout: 5s
      retries: 20
