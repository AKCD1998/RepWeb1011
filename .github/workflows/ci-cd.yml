name: Rx1011 CI

env:
  PAGES_ARTIFACT_NAME: github-pages-${{ github.run_attempt }}

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - "REACTjs-Project/**"
      - ".github/workflows/ci-cd.yml"
      - "render.yaml"
  pull_request:
    branches:
      - main
      - master
      - develop
    paths:
      - "REACTjs-Project/**"
      - ".github/workflows/ci-cd.yml"
      - "render.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Build And Verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: REACTjs-Project
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: REACTjs-Project/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run CI script
        run: npm run ci

  deploy-frontend-pages:
    name: Deploy Frontend To GitHub Pages
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment_retry.outputs.page_url || steps.deployment_primary.outputs.page_url }}
    defaults:
      run:
        working-directory: REACTjs-Project
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: REACTjs-Project/package-lock.json

      - name: Declare frontend deploy environment
        run: |
          echo "VITE_API_BASE=https://sc-official-website.onrender.com"
          echo "VITE_RX1011_API_PREFIX=/api/rx1011"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_BASE: https://sc-official-website.onrender.com
          VITE_RX1011_API_PREFIX: /api/rx1011
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
        run: npm run build

      - name: Validate built API target
        run: |
          if grep -R "repweb1011.onrender.com" dist; then
            echo "Build still points at deprecated RepWeb1011 backend"
            exit 1
          fi
          if ! grep -R "sc-official-website.onrender.com" dist >/dev/null; then
            echo "Build is missing shared currentSC backend URL"
            exit 1
          fi
          if ! grep -R "/api/rx1011" dist >/dev/null; then
            echo "Build is missing Rx1011 API prefix"
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: ${{ env.PAGES_ARTIFACT_NAME }}
          path: REACTjs-Project/dist

      - name: Deploy to GitHub Pages
        id: deployment_primary
        continue-on-error: true
        uses: actions/deploy-pages@v4
        with:
          artifact_name: ${{ env.PAGES_ARTIFACT_NAME }}

      - name: Wait before retrying GitHub Pages deploy
        if: steps.deployment_primary.outcome == 'failure'
        run: sleep 20

      - name: Retry GitHub Pages deploy once
        if: steps.deployment_primary.outcome == 'failure'
        id: deployment_retry
        uses: actions/deploy-pages@v4
        with:
          artifact_name: ${{ env.PAGES_ARTIFACT_NAME }}

      - name: Fail workflow if GitHub Pages deploy did not succeed
        if: steps.deployment_primary.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        run: |
          echo "GitHub Pages deploy failed twice in the same workflow run."
          exit 1
