name: Rx1011 CI/CD

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - "REACTjs-Project/**"
      - ".github/workflows/ci-cd.yml"
      - "render.yaml"
  pull_request:
    branches:
      - main
      - master
      - develop
    paths:
      - "REACTjs-Project/**"
      - ".github/workflows/ci-cd.yml"
      - "render.yaml"
  workflow_dispatch:

jobs:
  ci:
    name: Build And Verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: REACTjs-Project
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: REACTjs-Project/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run CI script
        run: npm run ci

  deploy-render:
    name: Deploy Backend To Render
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && secrets.RENDER_DEPLOY_HOOK_URL != ''
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_URL"
