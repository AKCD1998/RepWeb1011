services:
  - type: web
    name: rx1011-api
    runtime: node
    rootDir: REACTjs-Project
    buildCommand: npm ci
    startCommand: npm run start
    autoDeploy: false
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
