services:
  - type: web
    name: rx1011-api
    runtime: node
    branch: main
    rootDir: REACTjs-Project
    buildCommand: npm ci
    startCommand: npm run start
    autoDeployTrigger: checksPass
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - REACTjs-Project/server/**
        - REACTjs-Project/package.json
        - REACTjs-Project/package-lock.json
        - REACTjs-Project/patients_rows.csv
        - render.yaml
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
